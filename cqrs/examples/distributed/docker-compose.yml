services:
  redis:
    image: redis:alpine
    container_name: gokit_cqrs_example_app_redis
    ports:
      - "6379:6379"
    networks:
      - gokit_cqrs_example_app_redis_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  gokit_cqrs_example_app_redis_default:
